name: Bug Report
description: Create a report to help us improve LumaHunt.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: LumaHunt Version
      description: What version of LumaHunt are you using?
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: input
    id: mc_version
    attributes:
      label: Minecraft Version
      placeholder: e.g. 1.20.1
    validations:
      required: true
  - type: input
    id: loader
    attributes:
      label: Mod Loader
      placeholder: Fabric / Quilt
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / Crash Report
      description: Please paste any relevant logs or huge stack traces here or link to a gist.
      render: shell
    validations:
      required: false
